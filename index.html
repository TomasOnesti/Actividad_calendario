<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario</title>
    <link rel="stylesheet" href="./css/estilo.css">
</head>
<body>
    <!-- Contenedor principal del calendario -->
    <div class="calendar">
        <!-- Información del mes y año -->
        <div class="calendarinfo">
            <!-- Botón para ir al mes anterior -->
            <div class="calendar_change" id="prev-month">&#9664;</div>
            <div class="calendartitle">
                <!-- Mostrar el mes actual -->
                <div class="calendar__month" id="month"></div>
                <!-- Mostrar el año actual -->
                <div class="calendar__year" id="year"></div>    
            </div>
            <!-- Botón para ir al mes siguiente -->
            <div class="calendar_change" id="next-month">&#9654;</div>
        </div>
        <div class="mensaje">
            <div class="saludo" id="saludo"></div>
            <button class="cambio" onclick="borrarnombre()">Cambiar nombre</button>
            <button class="cambio" id="modo-btn">Modo infantil</button>
        </div>
        <!-- Días de la semana -->
        <div class="calendarweek">
            <!-- Lunes -->
            <div class="calendar_day calendar__item">Lunes</div>
            <!-- Martes -->
            <div class="calendar_day calendar__item">Martes</div>
            <!-- Miércoles -->
            <div class="calendar_day calendar__item">Miércoles</div>
            <!-- Jueves -->
            <div class="calendar_day calendar__item">Jueves</div>
            <!-- Viernes -->
            <div class="calendar_day calendar__item">Viernes</div>
            <!-- Sábado -->
            <div class="calendar_day calendar__item">Sábado</div>
            <!-- Domingo -->
            <div class="calendar_day calendar__item">Domingo</div>
        </div>
        <ol class="orden" id="day"></ol>
    </div>
    <script src="./js/funciones_calendario.js"></script>
</body>
</html>
